<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>

    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <script src="script.js"></script>

  <body>
    <div id="app" class="p-3">
      <div>
        <h1>Quiz App</h1>

        <div
          id="question-container"
          class="box card p-3 mb-2"
        >
          <p id="question-text">Question will appear here</p>
        </div>

        <div id="answers-container">
          <div
            class="answer-box card p-3 mb-2"
            data-correct="false"
          >
            Answer A
          </div>
          <div
            class="answer-box card p-3 mb-2"
            data-correct="true"
          >
            Answer B (current correct)
          </div>
          <div
            class="answer-box card p-3 mb-2"
            data-correct="false"
          >
            Answer C
          </div>
          <div
            class="answer-box card p-3 mb-2"
            data-correct="false"
          >
            Answer D
          </div>
        </div>

        <div
          id="feedback-box"
          class="box card p-3 mb-2"
        >
          <p id="feedback-text">Click an answer to begin</p>
        </div>

        <div id="controls" class="d-flex justify-content-between mt-4">
          <button id="theme-toggle" class="btn theme-btn btn-sm"> Toggle Visual Mode </button>
          <button
            id="next-btn"
            class="btn btn-light btn-sm px-4 fw-bold"
            style="display: none"> Next </button>
          <button id="end-btn" class="btn btn-danger btn-sm">End Quiz</button>
        </div>

        <div id="result-container">
          <div
            id="score-box"
            class="box card p-3 mb-2"
          >
            <p>Score:</p>
            <p id="score-value">0/0</p>
          </div>
        </div>
      </div>

      <div id="start-screen" class="end-screen" style="display: flex;">
        <div class="end-content">
            <h2>Welcome to the Quiz</h2>
            <button id="start-btn" class="btn btn-light btn-sm mt-3">Start</button>
        </div>
      </div>

      <div id="end-screen" class="end-screen">
       <div class="end-content">
        <h2>Quiz Finished</h2>
         <p id="final-score">0/0</p>
          <button id="restart-btn" class="btn btn-dark btn-sm mt-3"> Restart</button>
       </div>
      </div>
    </div>
  </body>
</html>
